name: Test

on: [push, pull_request, workflow_dispatch]

permissions: {}

env:
  FORCE_COLOR: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "pypy3.11"
          - "3.15t"
          - "3.15"
          - "3.14t"
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - python-version: "3.16"
            os: ubuntu-latest
          - python-version: "3.16t"
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: "!startsWith(matrix.python-version, '3.16')"
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up Python ${{ matrix.python-version }} (deadsnakes)
        uses: deadsnakes/action@e640ac8743173a67cca4d7d77cd837e514bf98e8 # v3.2.0
        if: startsWith(matrix.python-version, '3.16')
        with:
          python-version: "3.16-dev"
          nogil: ${{ endsWith(matrix.python-version, 't') }}

      - name: Set PYTHON_GIL
        if: endsWith(matrix.python-version, 't')
        run: |
          echo "PYTHON_GIL=0" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Tox tests
        run: |
          uvx --python ${{ matrix.python-version }} --with tox-uv tox -e py

      - name: Test CLI
        run: |
          uvx --python ${{ matrix.python-version }} --with tox-uv tox -e cli

      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          flags: ${{ matrix.os }}
          name: ${{ matrix.os }} Python ${{ matrix.python-version }}

  success:
    needs: test
    runs-on: ubuntu-latest
    name: Test successful
    steps:
      - name: Success
        run: echo Test successful
